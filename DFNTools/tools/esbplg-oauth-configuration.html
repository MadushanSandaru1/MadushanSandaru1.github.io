        <div class="row" data-aos="fade-up" data-aos-delay="100">

          <div class="col-lg-12">
            <div class="generator">
              <div class="form-group">
                <div class="form-floating">
                  <input aria-label="Country Code" class="form-control clear-input-fields-class" id="country-code" type="text" placeholder="Country Code (Ex: KSA)">

              </div>
              <div class="form-group">

              <hr>

              <div class="form-group">
                <h5>URLs and Endpoints</h5>
              </div>
              
              <div class="form-group">
                <div class="form-floating">
                  <input aria-label="Plugin Base URL" class="form-control clear-input-fields-class" id="plugin-base-url" type="text" placeholder="Plugin Base URL (Ex: http://0.0.0.0:6060/api/jadwa/cis)">
                  <label for="plugin-base-url">Plugin Base URL (Ex: http://0.0.0.0:6060/api/jadwa/cis)</label>
                </div>
              </div>
              
              <div class="form-group">
                <div class="form-floating">
                  <input aria-label="Base URL to be exposed" class="form-control clear-input-fields-class" id="base-url-to-be-exposed" type="text" placeholder="Base URL to be exposed (Ex: http://0.0.0.0:6060/cis)">
                  <label for="base-url-to-be-exposed">Base URL to be exposed (Ex: http://0.0.0.0:6060/cis)</label>
                </div>
              </div>

              <hr>

              <div class="form-group">
                <h6>Service No: 1<span class="text-primary clear-h6-spans-class" id="service-name-topic-1"></span></h6>
              </div>
              
              <div class="form-group">
                <div class="form-floating">
                  <input aria-label="Service Name" class="form-control clear-input-fields-class" id="service-name-1" type="text" placeholder="Service Name (Ex: CUSTOMER_CREATE, BEN_ACC_DELETE)" oninput="handleServiceNameInput(1)" onfocusout="handleServiceNameFocusOut(1)">
                  <label for="service-name-1">Service Name (Ex: CUSTOMER_CREATE, BEN_ACC_DELETE)</label>
                </div>
              </div>
              <div class="form-group">
                <div class="input-group">
                    <span class="input-group-text fill-plugin-base-url-spans-class clear-input-spans-class"></span>
                    <div class="form-floating">
                      <input  aria-label="Service Endpoint" class="form-control clear-input-fields-class" id="service-endpoint-1" type="text" placeholder="Service Endpoint (Ex: createCustomer, deleteBenAccount)" oninput="handleServiceEndpointInput(1)" onfocusout="handleServiceEndpointFocusOut(1)">
                      <label for="service-endpoint-1">Service Endpoint (Ex: createCustomer, deleteBenAccount)</label>
                    </div>
                </div>
              </div>
              <div class="form-group">
                <div class="form-floating">
                  <select class="form-select" id="http-method-1" aria-label="HTTP Method">

                    <option selected value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="PATCH">PATCH</option>
                    <option value="DELETE">DELETE</option>
                    <option value="HEAD">HEAD</option>
                    <option value="OPTIONS">OPTIONS</option>
                    <option value="CONNECT">CONNECT</option>
                    <option value="TRACE">TRACE</option>
                  </select>
                  <label for="http-method-1">HTTP Method</label>
                </div>
              </div>

              <div class="form-group">
                <div class="input-group">
                    <span class="input-group-text fill-base-url-to-be-exposed-spans-class clear-input-spans-class"></span>
                    <div class="form-floating">
                      <input  aria-label="Endpoint to be exposed" class="form-control clear-input-fields-class" id="fill-service-endpoint-to-be-exposed-1" type="text" placeholder="Endpoint to be exposed" readonly>
                      <label for="fill-service-endpoint-to-be-exposed-1">Endpoint to be exposed</label>
                    </div>
                </div>
              </div>

              <hr>

              <div class="form-group">
                <h6>Service No: 2<span class="text-primary clear-h6-spans-class" id="service-name-topic-2"></span></h6>
              </div>
              
              <div class="form-group">
                <div class="form-floating">
                  <input aria-label="Service Name" class="form-control clear-input-fields-class" id="service-name-2" type="text" placeholder="Service Name (Ex: CUSTOMER_CREATE, BEN_ACC_DELETE)" oninput="handleServiceNameInput(2)" onfocusout="handleServiceNameFocusOut(2)">
                  <label for="service-name-2">Service Name (Ex: CUSTOMER_CREATE, BEN_ACC_DELETE)</label>
                </div>
              </div>
              <div class="form-group">
                <div class="input-group">
                    <span class="input-group-text fill-plugin-base-url-spans-class clear-input-spans-class"></span>
                    <div class="form-floating">
                      <input  aria-label="Service Endpoint" class="form-control clear-input-fields-class" id="service-endpoint-2" type="text" placeholder="Service Endpoint (Ex: createCustomer, deleteBenAccount)" oninput="handleServiceEndpointInput(2)" onfocusout="handleServiceEndpointFocusOut(2)">
                      <label for="service-endpoint-2">Service Endpoint (Ex: createCustomer, deleteBenAccount)</label>
                    </div>
                </div>
              </div>
              <div class="form-group">
                <div class="form-floating">
                  <select class="form-select" id="http-method-2" aria-label="HTTP Method">
                    <option value="GET">GET</option>
                    <option selected value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="PATCH">PATCH</option>
                    <option value="DELETE">DELETE</option>
                    <option value="HEAD">HEAD</option>
                    <option value="OPTIONS">OPTIONS</option>
                    <option value="CONNECT">CONNECT</option>
                    <option value="TRACE">TRACE</option>
                  </select>
                  <label for="http-method-2">HTTP Method</label>
                </div>
              </div>
              
              <div class="form-group">
                <div class="input-group">
                    <span class="input-group-text fill-base-url-to-be-exposed-spans-class clear-input-spans-class"></span>
                    <div class="form-floating">
                      <input  aria-label="Endpoint to be exposed" class="form-control clear-input-fields-class" id="fill-service-endpoint-to-be-exposed-2" type="text" placeholder="Endpoint to be exposed" readonly>
                      <label for="fill-service-endpoint-to-be-exposed-2">Endpoint to be exposed</label>
                    </div>
                </div>
              </div>

              <div class="text-center">
                <button class="btn btn-primary mr-3" data-toggle="modal" data-target="#tool-modal" onclick="showModal()">Generate Config</button>
                <button class="btn btn-secondary px-5 ml-3" onclick="clearFields()">Clear</button>
              </div>

            </div>
        
            <!-- SQL query modal -->
            <div class="modal fade" id="tool-modal" tabindex="-1" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-title">

                    </div>
                    <div class="modal-body">
                        <!-- Modal body will be updated dynamically -->
                        <textarea aria-label="Json Config" class="form-control form-control-sm" id="modal-body" placeholder="Json Config" rows="30" readonly></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-warning btn-sm" onclick="copyToClipboard()">Copy</button>
                    </div>
                </div>
              </div>
            </div>
    
            <!-- notification toast -->
            <div aria-atomic="true" aria-live="polite" data-delay="5000">
                <div class="toast" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
                    <div class="toast-body bg-warning" id="toast-body">
                        <!-- Toast body will be updated dynamically -->

                </div>
            </div>

          </div>

  <script crossorigin="anonymous" integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut" src="https://cdn.jsdelivr.net/npm/popper.js@1.14.6/dist/umd/popper.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k" src="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js"></script>

  <!-- Optional JavaScript -->
  <script>
    document.getElementById("country-code").addEventListener("input", function () {
        var value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        this.value = value;

        var countryCode = value.toUpperCase().replace(/\s+/g, '_'); // Replace spaces with underscores
        var brokerCode = document.getElementById("broker-code").value.toUpperCase();
        var integrationName = document.getElementById("integration-name").value.toUpperCase();
        
        if (countryCode+brokerCode+integrationName === '') {
          document.getElementById("plugin-name-text").value = '';
        } else {
          document.getElementById("plugin-name-text").value = countryCode + "_" + brokerCode + "_" + integrationName + "_API_GATEWAY";
        }
    });

    document.getElementById("broker-code").addEventListener("input", function () {
        var value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        this.value = value;
        
        var countryCode = document.getElementById("country-code").value.toUpperCase();
        var brokerCode = value.toUpperCase().replace(/\s+/g, '_'); // Replace spaces with underscores
        var integrationName = document.getElementById("integration-name").value.toUpperCase();
        
        if (countryCode+brokerCode+integrationName === '') {
          document.getElementById("plugin-name-text").value = '';
        } else {
          document.getElementById("plugin-name-text").value = countryCode + "_" + brokerCode + "_" + integrationName + "_API_GATEWAY";
        }
    });

    document.getElementById("integration-name").addEventListener("input", function () {
        var value = this.value.replace(/[^a-zA-Z0-9_ ]/g, '').replace(/\s+/g, '_').toUpperCase();
        this.value = value;

        var countryCode = document.getElementById("country-code").value.toUpperCase();
        var brokerCode = document.getElementById("broker-code").value.toUpperCase();
        var integrationName = value.toUpperCase().replace(/\s+/g, '_'); // Replace spaces with underscores
        document.getElementById("plugin-name-text").value = countryCode + "_" + brokerCode + "_" + integrationName + "_API_GATEWAY";
        
        if (countryCode+brokerCode+integrationName === '') {
          document.getElementById("plugin-name-text").value = '';
        } else {
          document.getElementById("plugin-name-text").value = countryCode + "_" + brokerCode + "_" + integrationName + "_API_GATEWAY";
        }
    });

    document.getElementById("plugin-base-url").addEventListener("input", function () {
        var value = this.value.replace(/[^a-zA-Z0-9-._\/:?&=#]/g, '');
        this.value = value;
        
        var fillInputSpansElements = document.getElementsByClassName("fill-plugin-base-url-spans-class");
        for (var i = 0; i < fillInputSpansElements.length; i++) {
          if (value) {
            fillInputSpansElements[i].innerText = value + "/";
          } else {
            fillInputSpansElements[i].innerText = '';
          }
        }
    });

    document.getElementById("plugin-base-url").addEventListener("focusout", function () {
        var value = this.value;
        while (value.endsWith("/")) {
            value = value.slice(0, -1); // Remove trailing slashes
        }
        this.value = value;

        var fillInputSpansElements = document.getElementsByClassName("fill-plugin-base-url-spans-class");
        for (var i = 0; i < fillInputSpansElements.length; i++) {
          if (value) {
            fillInputSpansElements[i].innerText = value + "/";
          } else {
            fillInputSpansElements[i].innerText = '';
          }
        }
    });

    document.getElementById("base-url-to-be-exposed").addEventListener("input", function () {
        var value = this.value.replace(/[^a-zA-Z0-9-._\/:?&=#]/g, '');
        this.value = value;

        var fillInputSpansElements = document.getElementsByClassName("fill-base-url-to-be-exposed-spans-class");
        for (var i = 0; i < fillInputSpansElements.length; i++) {
          if (value) {
            fillInputSpansElements[i].innerText = value + "/";
          } else {
            fillInputSpansElements[i].innerText = '';
          }
        }
    });

    document.getElementById("base-url-to-be-exposed").addEventListener("focusout", function () {
        var value = this.value;
        while (value.endsWith("/")) {
            value = value.slice(0, -1); // Remove trailing slashes
        }
        this.value = value;

        var fillInputSpansElements = document.getElementsByClassName("fill-base-url-to-be-exposed-spans-class");
        for (var i = 0; i < fillInputSpansElements.length; i++) {
          if (value) {
            fillInputSpansElements[i].innerText = value + "/";
          } else {
            fillInputSpansElements[i].innerText = '';
          }
        }
    });

    function handleIntegrationNameFocusOut() {
        var element = document.getElementById("integration-name");
        var value = element.value;
        while (value.startsWith("_")) {
            value = value.substring(1); // Remove the first character if it's a '/'
        }
        while (value.endsWith("_")) {
            value = value.slice(0, -1); // Remove trailing slashes
        }
        element.value = value;
        var countryCode = document.getElementById("country-code").value.toUpperCase();
        var brokerCode = document.getElementById("broker-code").value.toUpperCase();
        var integrationName = value.toUpperCase().replace(/\s+/g, '_'); // Replace spaces with underscores

        if (countryCode+brokerCode+integrationName === '') {
          document.getElementById("plugin-name-text").value = '';
        } else {
          document.getElementById("plugin-name-text").value = countryCode + "_" + brokerCode + "_" + integrationName + "_API_GATEWAY";
        }
    }

    function handleServiceNameInput(id) {
      var element = document.getElementById("service-name-" + id);
      var value = element.value.replace(/[^a-zA-Z0-9_ ]/g, '').replace(/\s+/g, '_').toUpperCase();
      element.value = value;

      if (value) {
        document.getElementById("service-name-topic-" + id).innerText = " | "+ value.replace(/_/g, ' ');
      } else {
        document.getElementById("service-name-topic-" + id).innerText = '';
      }
    }

    function handleServiceNameFocusOut(id) {
      var element = document.getElementById("service-name-" + id);
        var value = element.value;
        while (value.startsWith("_")) {
            value = value.substring(1); // Remove the first character if it's a '/'
        }
        while (value.endsWith("_")) {
            value = value.slice(0, -1); // Remove trailing slashes
        }
        element.value = value;

        if (value) {
            document.getElementById("service-name-topic-" + id).innerText = " | "+ value.replace(/_/g, ' ');
        } else {
          document.getElementById("service-name-topic-" + id).innerText = '';
        }
    }

    function handleServiceEndpointInput(id) {
        var element = document.getElementById("service-endpoint-" + id);
        var value = element.value.replace(/[^a-zA-Z0-9\/_-]/g, '');
        element.value = value;
        document.getElementById("fill-service-endpoint-to-be-exposed-" + id).value = value;
    }

    function handleServiceEndpointFocusOut(id) {
        var element = document.getElementById("service-endpoint-" + id);
        var value = element.value;
        while (value.startsWith("/")) {
            value = value.substring(1); // Remove the first character if it's a '/'
        }
        while (value.endsWith("/")) {
            value = value.slice(0, -1); // Remove trailing slashes
        }
        element.value = value;
        document.getElementById("fill-service-endpoint-to-be-exposed-" + id).value = value;
    }

    function showModal() {
        $("#modal-title").text('Query');
        $("#modal-body").text('json file body');
        $(".modal").modal("show");
    }

    function copyToClipboard() {
        var template = '';
        template = document.getElementById("modal-body").value;
            $("#toast-body").text("Config copied!");

        navigator.clipboard.writeText(template).then(
            function () {
                $("#toast-body")
                    .toggleClass("bg-secondary", false)
                    .toggleClass("text-light", false)
                    .toggleClass("text-success", false)
                    .toggleClass("text-danger", false)
                    .toggleClass("bg-warning", true)
                    .toggleClass("text-dark", true);

                $(".toast").toast("show");
            },
            function (err) {
                console.error("Failed to copy: ", err);
            }
        );
    }

    function clearFields() {
        var clearInputFieldsElements = document.getElementsByClassName("clear-input-fields-class");
        for (var i = 0; i < clearInputFieldsElements.length; i++) {
            clearInputFieldsElements[i].value = '';
        }

        var clearPFieldsElements = document.getElementsByClassName("clear-p-fields-class");
        for (var i = 0; i < clearPFieldsElements.length; i++) {
            clearPFieldsElements[i].innerText = '';
        }
        
        var clearInputSpansElements = document.getElementsByClassName("clear-input-spans-class");
        for (var i = 0; i < clearInputSpansElements.length; i++) {
            clearInputSpansElements[i].innerText = '';
        }
        
        var clearH6SpansElements = document.getElementsByClassName("clear-h6-spans-class");
        for (var i = 0; i < clearH6SpansElements.length; i++) {
          clearH6SpansElements[i].innerText = '';
        }

        $("#toast-body")
            .toggleClass("bg-warning", false)
            .toggleClass("text-dark", false)
            .toggleClass("text-success", false)
            .toggleClass("text-danger", false)
            .toggleClass("bg-secondary", true)
            .toggleClass("text-light", true)
            .text("Cleared!");

        $(".toast").toast("show");
    }
  </script>
